<style>
*{box-sizing:border-box;margin:0;padding:0}

:root{
  --pink:#ff00cc;
  --cyan:#00ffff;
  --blue:#3333ff;
  --dark:#07091a;
  --card:#0d1226;
  --accent:#00b7ff;
}

body{
  font-family:Arial,sans-serif;
  background:var(--dark);
  color:#fff;
  min-height:100vh;
  overflow-x:hidden;
  user-select:none;
  -webkit-user-select:none;
}



/* ── HEADER ── */
header{
  background:linear-gradient(135deg,#1a003a,#0a0a2a,#1a003a);
  border-bottom:2px solid var(--pink);
  padding:10px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:10px;
  position:sticky;
  top:0;
  z-index:200;
  box-shadow:0 4px 30px rgba(255,0,204,.4);
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
  text-decoration:none;
  color:#fff;
}

.logo img{
  height:44px;
  border-radius:8px;
  box-shadow:0 0 10px var(--pink);
}

.logo-text{display:flex;flex-direction:column;line-height:1.2}

.logo-title{
  font-size:17px;
  font-weight:bold;
  background:linear-gradient(90deg,var(--pink),var(--cyan));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}

.logo-sub{font-size:10px;color:#888;letter-spacing:2px;text-transform:uppercase}

.live-badge{
  display:flex;
  align-items:center;
  gap:8px;
  background:rgba(255,0,0,.15);
  border:1px solid rgba(255,60,60,.5);
  border-radius:20px;
  padding:5px 14px;
  font-size:13px;
  font-weight:bold;
  color:#ff4444;
}

.live-dot{
  width:8px;height:8px;
  background:#ff4444;
  border-radius:50%;
  box-shadow:0 0 8px #ff4444;
  animation:livepulse 1s infinite;
}

@keyframes livepulse{
  0%,100%{opacity:1;transform:scale(1)}
  50%{opacity:.4;transform:scale(1.3)}
}

nav{display:flex;align-items:center;gap:4px}

nav a{
  color:#ccc;
  text-decoration:none;
  padding:6px 12px;
  border-radius:18px;
  font-size:13px;
  font-weight:bold;
  border:1px solid transparent;
  transition:.3s;
  white-space:nowrap;
}

nav a:hover{
  color:#fff;
  border-color:var(--pink);
  box-shadow:0 0 10px rgba(255,0,204,.4);
  background:rgba(255,0,204,.1);
}

nav a.active{
  color:var(--accent);
  border-color:var(--accent);
  background:rgba(0,183,255,.1);
}

.menu-toggle{
  display:none;
  background:none;
  border:2px solid var(--pink);
  color:var(--pink);
  font-size:20px;
  padding:4px 10px;
  border-radius:8px;
  cursor:pointer;
}

/* ── LAYOUT ── */
.app{
  width:100%;
  max-width:1300px;
  margin:0 auto;
  padding:20px 16px;
}

/* ── PLAYER ── */
.player-section{
  background:linear-gradient(135deg,var(--card),#070d1f);
  border:1px solid rgba(0,183,255,.25);
  border-radius:18px;
  padding:16px;
  margin-bottom:24px;
  box-shadow:0 10px 50px rgba(0,0,0,.6);
}

.now-playing{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:12px;
}

.now-playing-label{
  font-size:11px;
  color:#888;
  text-transform:uppercase;
  letter-spacing:2px;
}

.now-playing-title{
  font-size:16px;
  font-weight:bold;
  color:#fff;
}

.player-box{
  width:100%;
  aspect-ratio:16/9;
  background:#000;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 0 40px rgba(0,183,255,.2);
  border:1px solid rgba(0,183,255,.15);
}

.player-box video,
.player-box iframe{
  width:100%;
  height:100%;
  border:none;
  display:block;
}

/* ── MSG ERROR ── */
.error-msg{
  display:none;
  text-align:center;
  padding:60px 20px;
  color:#888;
}

.error-msg svg{opacity:.3;margin-bottom:12px}
.error-msg p{font-size:15px}

/* ── FILTROS ── */
.filters{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:16px;
}

.filter-btn{
  padding:6px 16px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.12);
  border-radius:20px;
  color:#aaa;
  font-size:12px;
  font-weight:bold;
  cursor:pointer;
  transition:.2s;
  white-space:nowrap;
}

.filter-btn:hover{
  background:rgba(0,183,255,.1);
  border-color:var(--accent);
  color:#fff;
}

.filter-btn.active{
  background:rgba(0,183,255,.2);
  border-color:var(--accent);
  color:var(--accent);
  box-shadow:0 0 10px rgba(0,183,255,.3);
}

/* ── GRID CANALES ── */
.section-header{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:14px;
}

.section-header h2{
  font-size:16px;
  color:#ddd;
  white-space:nowrap;
}

.section-line{
  flex:1;height:1px;
  background:linear-gradient(90deg,rgba(0,183,255,.4),transparent);
}

.lista{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(110px,1fr));
  gap:10px;
}

.canal{
  background:linear-gradient(145deg,var(--card),#08102a);
  border:1px solid rgba(255,255,255,.07);
  padding:10px 8px;
  border-radius:12px;
  text-align:center;
  cursor:pointer;
  transition:.25s;
  position:relative;
  overflow:hidden;
}

.canal::after{
  content:'';
  position:absolute;
  bottom:0;left:0;right:0;
  height:2px;
  background:var(--accent);
  transform:scaleX(0);
  transition:.25s;
}

.canal:hover{
  transform:translateY(-3px);
  border-color:rgba(0,183,255,.4);
  box-shadow:0 6px 20px rgba(0,0,0,.5);
}

.canal:hover::after{transform:scaleX(1)}

.canal.activo{
  border-color:var(--accent);
  box-shadow:0 0 16px rgba(0,183,255,.4);
  background:linear-gradient(145deg,#0a1a30,#061525);
}

.canal.activo::after{transform:scaleX(1)}

.canal img{
  width:100%;
  height:58px;
  object-fit:cover;
  border-radius:8px;
  margin-bottom:6px;
}

.canal-name{
  font-size:10px;
  color:#aaa;
  line-height:1.3;
  word-break:break-word;
}

.canal.activo .canal-name{color:var(--accent)}

/* ── FOOTER ── */
footer{
  background:linear-gradient(135deg,#0d001f,#0a0a1a);
  border-top:1px solid rgba(255,0,204,.2);
  padding:20px;
  text-align:center;
  color:#555;
  font-size:12px;
  margin-top:30px;
}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  .lista{grid-template-columns:repeat(auto-fill,minmax(90px,1fr))}

@media(max-width:600px){
  .menu-toggle{display:block}

  nav{
    width:100%;
    display:none;
    flex-direction:column;
    background:rgba(7,9,26,.97);
    border:1px solid rgba(0,183,255,.25);
    border-radius:12px;
    padding:8px;
    margin-top:6px;
  }

  nav.open{display:flex}
  nav a{text-align:center;border-radius:8px}

  .live-badge{display:none}
  .lista{grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px}
}
</style>

const cats = ['Todos', ...new Set(canales.map(c => c.cat))];
cats.forEach(cat => {
  const btn = document.createElement('button');
  btn.className = 'filter-btn' + (cat === 'Todos' ? ' active' : '');
  btn.textContent = cat;
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCat = cat;
    renderCanales();
  });
  filtersBox.appendChild(btn);
});

    const div = document.createElement('div');
    div.className = 'canal';
    div.innerHTML = `<img src="${c.l}" alt="${c.n}" loading="lazy" onerror="this.src='https://i.postimg.cc/TP81RyJR/Logo-Canal-1.png'"><div class="canal-name">${c.n}</div>`;

    div.addEventListener('click', () => {
      if(activeDiv) activeDiv.classList.remove('activo');
      activeDiv = div;
      div.classList.add('activo');
      nowTitle.textContent = c.n;
      play(c.u);
    });

    lista.appendChild(div);
  });
}

// ── PLAYER ──
function play(url){
  if(hls){ hls.destroy(); hls = null; }
  playerBox.innerHTML = '';

  if(url.includes('.m3u8')){
    const video = document.createElement('video');
    video.controls = true;
    video.autoplay  = true;
    video.muted     = false;
    video.playsInline = true;
    video.style.cssText = 'width:100%;height:100%;background:#000';

    playerBox.appendChild(video);

    if(Hls.isSupported()){
      hls = new Hls({ maxBufferLength:30 });
      hls.loadSource(url);
      hls.attachMedia(video);
      hls.on(Hls.Events.ERROR, (_e, data) => {
        if(data.fatal) showError();
      });
    } else if(video.canPlayType('application/vnd.apple.mpegurl')){
      video.src = url;
    } else {
      showError();
    }

  } else if(url.includes('.mp4') || url.includes('.webm')){
    const video = document.createElement('video');
    video.controls   = true;
    video.autoplay   = true;
    video.muted      = true;
    video.playsInline = true;
    video.style.cssText = 'width:100%;height:100%;background:#000';
    video.src = url;
    playerBox.appendChild(video);

  } else {
    playerBox.innerHTML = `<iframe src="${url}" allow="autoplay; fullscreen" allowfullscreen></iframe>`;
  }
}

function showError(){
  playerBox.innerHTML = `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#666;gap:12px">
    <div style="font-size:48px">📡</div>
    <p>Señal no disponible. Intenta otro canal.</p>
  </div>`;
}

// ── MENÚ ──
function toggleMenu(){
  document.getElementById('menu').classList.toggle('open');
}

// ── INICIO ──
renderCanales();
// Auto-reproducir primer canal
const firstDiv = lista.querySelector('.canal');
if(firstDiv){ firstDiv.click(); }
</script>
