name: Deploy a GitHub Pages

on:
  push:
    branches: [ main ] # Se activa cuando subes algo a la rama main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        # IMPORTANTE: Cambia 'nombre-de-tu-repo' por el nombre real en GitHub
        run: npx ng build --configuration production --base-href /nombre-de-tu-repo/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Revisa que en tu carpeta 'dist' la ruta sea esta
          path: ./dist/nombre-de-tu-proyecto/browser 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4